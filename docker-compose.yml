services:
  paralegal-app:
    build: .
    container_name: paralegal-app
    restart: always
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=https://paralegal.leonardkabo.cloud
    volumes:
      # Persistance de la base de données et des fichiers envoyés
      - ./paralegal.db:/app/paralegal.db
      - ./uploads:/app/uploads
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      # On force Traefik à utiliser ce réseau pour la communication interne
      - "traefik.docker.network=traefik-network"
      # Configuration du domaine
      - "traefik.http.routers.paralegal.rule=Host(`paralegal.leonardkabo.cloud`)"
      - "traefik.http.routers.paralegal.entrypoints=websecure"
      # Correction : On utilise 'mytlschallenge' trouvé via le docker inspect
      - "traefik.http.routers.paralegal.tls.certresolver=mytlschallenge"
      # Port interne de ton application
      - "traefik.http.services.paralegal.loadbalancer.server.port=3000"

networks:
  traefik-network:
    external: true