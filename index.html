<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Paralegal APP</title>
    <!-- Code développé par Léonard KABO -->
    
    <!-- Service Worker PWA Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('PWA Service Worker enregistré avec succès:', reg.scope);
            })
            .catch(function(err) {
              console.warn('Echec de l\'enregistrement du Service Worker PWA:', err);
            });
        });
      }
    </script>

    <!-- Shielding against external browser extension injection errors in sandboxed iframes -->
    <script>
      (function() {
        var isExtensionError = function(msg, url, line) {
          var errorString = String(msg || '');
          var urlString = String(url || '');
          return (
            errorString.indexOf('fetch of #<Window>') !== -1 ||
            errorString.indexOf('MetaMask') !== -1 ||
            errorString.indexOf('ethereum') !== -1 ||
            errorString.indexOf('Cannot set property fetch') !== -1 ||
            urlString.indexOf('extension') !== -1 ||
            urlString.indexOf('metamax') !== -1
          );
        };

        window.addEventListener('error', function(event) {
          if (isExtensionError(event.message, event.filename, event.lineno)) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = reason ? (reason.message || reason) : '';
          var file = reason ? (reason.fileName || reason.sourceURL) : '';
          if (isExtensionError(msg, file)) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
